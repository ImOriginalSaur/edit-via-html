<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Quiz Time! 🚗💨</title>
    <style>
        body {
            background-color: #f0f3f8;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }

        .screen {
            display: none;
            text-align: center;
            z-index: 2;
            max-width: 450px;
            width: 90%;
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            border: 4px solid #000000;
            box-shadow: 8px 8px 0px #000000;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active {
            display: block;
        }

        h1 {
            font-size: 26px;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-option {
            background-color: #fbc531;
            color: #000000;
            border: 3px solid #000000;
            font-family: 'Arial Black', sans-serif;
            font-weight: bold;
            text-align: left;
            padding: 16px 20px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-option:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000000;
        }

        .btn-option:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        .meme-img {
            width: 85%;
            max-width: 280px;
            border: 4px solid #000000;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0px #000000;
        }

        .btn-reset {
            background-color: #4cd137;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            border: 3px solid #000000;
            border-radius: 10px;
            box-shadow: 4px 4px 0px #000000;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-reset:hover {
            background-color: #44bd32;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: THE TRAFFIC QUESTION -->
    <div class="screen active" id="screen-quiz">
        <h1>Anong gagawin mo kung may liliko sa kanan? 🤔🚘</h1>
        <div class="quiz-container">
            <button class="btn-option" onclick="playMemeQuiz('A')">A. Sisingit</button>
            <button class="btn-option" onclick="playMemeQuiz('B')">B. Hihinto</button>
            <button class="btn-option" onclick="playMemeQuiz('C')">C. Dederetso</button>
            <button class="btn-option" onclick="playMemeQuiz('D')">D. Wala akong pake-alam</button>
        </div>
    </div>

    <!-- SCREEN 2: DYNAMIC FAIL SCREEN (Content updates automatically) -->
    <div class="screen" id="screen-fail">
        <!-- The ID attributes below let JS change the image and text on the fly -->
        <img class="meme-img" id="fail-image" src="https://media.tenor.com/tHqg2uD6vK8AAAAM/maiipit-ka-ngani-maiipit-ka.gif" alt="Meme React">
        <h1 id="fail-title" style="color: #e84118; margin-bottom: 10px;">⚠️ MAIIPIT KA NGANII!</h1>
        <p id="fail-description" style="font-family: sans-serif; font-weight: bold; color: #333;">KAMOTE KABA?! HA?!! SABIHIN MOLANG, ALAM MO NAKAKAINIS KA!</p>
        <button class="btn-reset" onclick="resetQuiz()">TRY AGAIN 🔄</button>
    </div>

    <!-- SCREEN 3: SUCCESS SCREEN (For B) -->
    <div class="screen" id="screen-success">
        <img class="meme-img" src="https://github.com/ImOriginalSaur/teatsing/blob/main/Correct.png.jpg?raw=true" alt="Success Dance">
        <h1 style="color: #4cd137; margin-bottom: 10px;">AMEYSING!!!</h1>
        <p style="font-family: sans-serif; font-weight: bold; color: #333;">Galing mo ah!!</p>
        <button class="btn-reset" onclick="resetQuiz()" style="background-color: #00a8ff;">PLAY AGAIN 🚗</button>
    </div>

    <!-- ================= AUDIO ELEMENTS ================= -->

    <!-- AUDIO A: Sisingit ("Maiipit Ka Ngani") -->
    <audio id="audio-a" preload="auto">
        <source src="https://github.com/ImOriginalSaur/teatsing/raw/refs/heads/main/maiipit-ka-nganii.mp3" type="audio/mpeg">
    </audio>

    <!-- AUDIO B: Hihinto (Correct/Win Sound) -->
    <audio id="audio-b" preload="auto">
        <source src="https://github.com/ImOriginalSaur/teatsing/raw/refs/heads/main/wow-galing-naman.mp3" type="audio/mpeg">
    </audio>

    <!-- AUDIO C: Dederetso (Gadon) -->
    <audio id="audio-c" preload="auto">
        <source src="https://github.com/ImOriginalSaur/teatsing/raw/refs/heads/main/gadon-curses-raises-middle-finger-at-sereno-supporters.mp3" type="audio/mpeg">
    </audio>

    <!-- AUDIO D: Wala akong pake-alam (Baliw ka yata) -->
    <audio id="audio-d" preload="auto">
        <source src="https://github.com/ImOriginalSaur/teatsing/raw/refs/heads/main/baliw-ka-yata-eh.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audioA = document.getElementById('audio-a');
        const audioB = document.getElementById('audio-b');
        const audioC = document.getElementById('audio-c');
        const audioD = document.getElementById('audio-d');

        function goToScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function playMemeQuiz(choice) {
            // Stop all sounds before playing the new one
            audioA.pause(); audioB.pause(); audioC.pause(); audioD.pause();

            // Get references to our dynamic elements
            const failImg = document.getElementById('fail-image');
            const failTitle = document.getElementById('fail-title');
            const failDesc = document.getElementById('fail-description');

            if (choice === 'A') {
                // Set Up Screen 2 Content for Option A
                failImg.src = "https://github.com/ImOriginalSaur/teatsing/blob/main/jb-suarez-patawaadd-v0-q4j4cemtqq9h1.png?raw=true";
                failTitle.innerText = "⚠️ MAIIPIT KA NGANII!";
                failDesc.innerText = "KAMOTE KABA?! HA?!! SABIHIN MOLANG, ALAM MO NAKAKAINIS KA!";

                audioA.currentTime = 0;
                audioA.play().catch(e => console.log(e));
                goToScreen('screen-fail');
            } 
            else if (choice === 'B') {
                audioB.currentTime = 0;
                audioB.play().catch(e => console.log(e));
                goToScreen('screen-success');
            } 
            else if (choice === 'C') {
                // Set Up Screen 2 Content for Option C (Gadon Vibe)
                // Using a funny angry anime/meme react GIF for Gadon's vibe
                failImg.src = "https://github.com/ImOriginalSaur/teatsing/raw/refs/heads/main/gadon.png.jfif"; 
                failTitle.innerText = "BOBO!!!";
                failDesc.innerText = "DEDERETSO KAPA TALAGA?! ANO KA NONCHALANT??!!";

                audioC.currentTime = 0;
                audioC.play().catch(e => console.log(e));
                goToScreen('screen-fail');
            } 
            else if (choice === 'D') {
                // Set Up Screen 2 Content for Option D (Baliw ka yata Vibe)
                // Using a classic "baliw" / questioning life choices GIF
                failImg.src = "https://github.com/ImOriginalSaur/teatsing/blob/main/babalu.png.jpg?raw=true";
                failTitle.innerText = "⚠️ BALIW KA YATA EH!";
                failDesc.innerText = "Wala kang pakealam? Mag-commute ka na lang kung ganyan ka mag-isip! 🥴";

                audioD.currentTime = 0;
                audioD.play().catch(e => console.log(e));
                goToScreen('screen-fail');
            }
        }

        function resetQuiz() {
            audioA.pause(); audioB.pause(); audioC.pause(); audioD.pause();
            goToScreen('screen-quiz');
        }
    </script>
</body>
</html>
